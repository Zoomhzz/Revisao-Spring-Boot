# Define o nome do projeto (útil para logs e monitoramento)
spring.application.name=Revisao

# DDL-AUTO: Define o comportamento do Hibernate em relaçăo ŕs tabelas
# 'update': Ele cria as tabelas se năo existirem e altera se vocę adicionar novos campos
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do computador todos os comandos SQL que o Spring está executando
# Excelente para aprender e debugar o que acontece por baixo dos panos!
spring.jpa.show-sql=true

# Configuraçăo da conexăo com o Banco de Dados MySQL
# localhost:3306 -> Endereço do banco (sua própria máquina)
# db_api -> O nome do esquema/banco de dados que vocę criou no MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_api

# Usuário padrăo do MySQL (geralmente root)
spring.datasource.username=root

# Senha do seu banco de dados (está vazia, o que é comum em ambiente de estudo)
spring.datasource.password=